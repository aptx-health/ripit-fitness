version: 1
scanned_at: 2026-04-04T17:41:48.914729Z
inventory:
    languages:
        - javascript
    package_managers:
        - npm
    build_files:
        - Dockerfile
    ci:
        - GitHub Actions
    tooling:
        secrets: doppler
        process: overmind
        containers: docker
        env:
            - DOPPLER_CONFIG
    existing_claude_config:
        settings_json: false
        agent_def: true
        claude_md: true
context:
    build_command: "doppler run -- npm run build"
    test_command: "doppler run -- npm test"
    lint_command: "npm run lint && npm run type-check"
    base_branch: "dev"
    special_instructions: |
        Doppler setup required in worktrees: doppler setup --project fitcsv --config dev_personal --no-interactive
        After doppler setup, use 'doppler run --' without --config flag.
        NEVER use doppler configs: prd, preview, staging unless read-only operation.
        Prisma must stay on v6.x -- use npx prisma@6.19.0 to avoid v7.
        Lint and type-check do NOT require doppler.
        Docker must be running for tests (Testcontainers).
        Use fd instead of find for file searching.
        Pre-commit hooks enforce 1000-line file limit.
    tools_needed:
        - doppler
        - docker
        - npm
        - gh
        - fd
        - git
permissions:
    allowed_tools:
        - Bash
        - Read
        - Edit
        - Write
        - Glob
        - Grep
validation:
    status: untested
    failures: []
