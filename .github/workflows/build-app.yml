name: Build and Push App Image

on:
  push:
    branches:
      - dev
      - main
    paths-ignore:
      - '.claude/**'
      - '.agent-minder/**'
      - 'docs/**'
      - '*.md'
  pull_request:
    branches:
      - dev
    paths-ignore:
      - '.claude/**'
      - '.agent-minder/**'
      - 'docs/**'
      - '*.md'

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: aptx-health/ripit-fitness

jobs:
  build:
    runs-on: ubuntu-latest
    outputs:
      image-tag: ${{ steps.tags.outputs.tags }}
    permissions:
      contents: read
      packages: write
    environment: ${{ github.ref_name == 'main' && 'production' || github.ref_name == 'dev' && 'staging' || '' }}

    steps:
      - uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Determine image tags
        id: tags
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            SHORT_SHA=$(echo "${{ github.event.pull_request.head.sha }}" | cut -c1-7)
            echo "tags=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:pr-${{ github.event.pull_request.number }}-sha-${SHORT_SHA}" >> "$GITHUB_OUTPUT"
          elif [ "${{ github.ref_name }}" = "main" ]; then
            echo "tags=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:sha-${{ github.sha }}" >> "$GITHUB_OUTPUT"
          elif [ "${{ github.ref_name }}" = "dev" ]; then
            echo "tags=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:staging" >> "$GITHUB_OUTPUT"
          else
            echo "::error::Unexpected branch ${{ github.ref_name }}"
            exit 1
          fi

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.tags.outputs.tags }}
          build-args: |
            NEXT_PUBLIC_APP_URL=${{ vars.NEXT_PUBLIC_APP_URL || 'https://staging.ripit.fit' }}
            NEXT_PUBLIC_VENMO_HANDLE=${{ vars.NEXT_PUBLIC_VENMO_HANDLE }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Notify Discord (production builds)
        if: github.ref_name == 'main'
        run: |
          SHORT_SHA=$(echo "${{ github.sha }}" | cut -c1-7)
          curl -s -H "Content-Type: application/json" -d "{
            \"embeds\": [{
              \"title\": \"Production image ready\",
              \"description\": \"Update infra repo with new image tag:\n\`\`\`\nsha-${{ github.sha }}\n\`\`\`\",
              \"color\": 5025616,
              \"fields\": [
                {\"name\": \"Commit\", \"value\": \"[\`${SHORT_SHA}\`](https://github.com/${{ github.repository }}/commit/${{ github.sha }})\", \"inline\": true},
                {\"name\": \"Image\", \"value\": \"\`${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:sha-${{ github.sha }}\`\", \"inline\": false}
              ]
            }]
          }" "${{ secrets.DISCORD_WEBHOOK_URL }}"

  smoke-test:
    if: github.event_name == 'pull_request'
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: read
      packages: read

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: ripit_smoke
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/ripit_smoke
      IMAGE: ${{ needs.build.outputs.image-tag }}

    steps:
      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Pull PR image
        run: docker pull "$IMAGE"

      - name: Smoke test — prisma-migrate.sh (migrations + exercise sync)
        run: |
          docker run --rm \
            --network host \
            -e DATABASE_URL="$DATABASE_URL" \
            "$IMAGE" \
            sh -c "./scripts/prisma-migrate.sh"

      - name: Smoke test — app boots and responds
        run: |
          # Start the app in the background
          docker run --rm -d \
            --name smoke-app \
            --network host \
            -e DATABASE_URL="$DATABASE_URL" \
            -e BETTER_AUTH_SECRET=smoke-test-secret \
            -e BETTER_AUTH_URL=http://localhost:3000 \
            -e HOSTNAME=0.0.0.0 \
            -e PORT=3000 \
            "$IMAGE"

          # Wait for the app to be ready (up to 30s)
          echo "Waiting for app to start..."
          for i in $(seq 1 30); do
            if curl -sf http://localhost:3000/ > /dev/null 2>&1; then
              echo "App responded on attempt $i"
              break
            fi
            if [ "$i" = "30" ]; then
              echo "App failed to start within 30s"
              docker logs smoke-app
              docker stop smoke-app || true
              exit 1
            fi
            sleep 1
          done

          # Verify response
          HTTP_STATUS=$(curl -s -o /dev/null -w '%{http_code}' http://localhost:3000/)
          echo "HTTP status: $HTTP_STATUS"

          if [ "$HTTP_STATUS" -lt 200 ] || [ "$HTTP_STATUS" -ge 500 ]; then
            echo "Unexpected HTTP status $HTTP_STATUS"
            docker logs smoke-app
            docker stop smoke-app || true
            exit 1
          fi

          docker stop smoke-app
