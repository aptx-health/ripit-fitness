name: Build & Push Clone Worker

on:
  push:
    branches:
      - dev
      - main
    paths:
      - 'cloud-functions/clone-program/**'
      - 'prisma/schema.prisma'
      - '.github/workflows/deploy-clone-worker.yml'

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    environment: ${{ github.ref_name == 'main' && 'production' || 'staging' }}

    env:
      IMAGE_NAME: ghcr.io/aptx-health/clone-program

    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Copy Prisma schema into worker build context
        run: |
          mkdir -p cloud-functions/clone-program/prisma
          cp prisma/schema.prisma cloud-functions/clone-program/prisma/schema.prisma

      - name: Determine image tags
        id: tags
        run: |
          if [ "${{ github.ref_name }}" = "main" ]; then
            echo "tag=${{ github.sha }}" >> "$GITHUB_OUTPUT"
          elif [ "${{ github.ref_name }}" = "dev" ]; then
            echo "tag=staging" >> "$GITHUB_OUTPUT"
          else
            echo "::error::Unexpected branch ${{ github.ref_name }}"
            exit 1
          fi

      - name: Build Docker image
        run: |
          docker build \
            -t "$IMAGE_NAME:${{ steps.tags.outputs.tag }}" \
            ./cloud-functions/clone-program

      - name: Push Docker image to GHCR
        run: |
          docker push "$IMAGE_NAME:${{ steps.tags.outputs.tag }}"
