<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Exercise Match Review</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, system-ui, sans-serif; background: #1a1a2e; color: #e0e0e0; padding: 20px; }
  h1 { color: #00ff88; margin-bottom: 8px; }
  .subtitle { color: #888; margin-bottom: 20px; font-size: 14px; }
  .stats { display: flex; gap: 16px; margin-bottom: 20px; font-size: 14px; }
  .stat { background: #16213e; padding: 8px 14px; border-radius: 6px; }
  .stat .n { color: #00ff88; font-weight: bold; }

  .section { margin-bottom: 30px; }
  .section-header { font-size: 18px; font-weight: bold; margin-bottom: 10px; padding: 8px 0; border-bottom: 1px solid #333; }
  .section-header.good { color: #00ff88; }
  .section-header.ok { color: #ffaa00; }
  .section-header.bad { color: #ff4444; }

  .match-row {
    display: flex; align-items: center; gap: 12px;
    padding: 8px 12px; border-radius: 6px; margin-bottom: 4px;
    background: #16213e; transition: background 0.15s;
  }
  .match-row:hover { background: #1a2744; }
  .match-row.checked { opacity: 0.5; }

  .match-row input[type="checkbox"] {
    width: 20px; height: 20px; accent-color: #00ff88; cursor: pointer; flex-shrink: 0;
  }

  .verdict-badge {
    font-size: 11px; font-weight: bold; padding: 2px 8px; border-radius: 4px;
    width: 48px; text-align: center; flex-shrink: 0;
  }
  .verdict-badge.good { background: #00ff8833; color: #00ff88; }
  .verdict-badge.ok { background: #ffaa0033; color: #ffaa00; }
  .verdict-badge.bad { background: #ff444433; color: #ff4444; }

  .conf { font-size: 11px; color: #666; width: 50px; flex-shrink: 0; }

  .names { flex: 1; display: flex; align-items: center; gap: 8px; font-size: 14px; min-width: 0; }
  .our-name { color: #e0e0e0; font-weight: 500; min-width: 200px; flex-shrink: 0; }
  .arrow { color: #555; flex-shrink: 0; }
  .their-name { color: #aaa; }

  .reason { font-size: 12px; color: #666; flex-shrink: 0; max-width: 280px; }

  .actions { position: sticky; bottom: 0; background: #1a1a2e; padding: 16px 0; border-top: 2px solid #333; margin-top: 20px; display: flex; gap: 12px; align-items: center; }
  button {
    padding: 10px 20px; border: none; border-radius: 6px; cursor: pointer;
    font-size: 14px; font-weight: bold;
  }
  .btn-export { background: #00ff88; color: #1a1a2e; }
  .btn-export:hover { background: #00cc6a; }
  .btn-check-all { background: #333; color: #e0e0e0; }
  .btn-check-all:hover { background: #444; }
  .export-status { color: #00ff88; font-size: 14px; }

  textarea { display: none; width: 100%; height: 300px; background: #0a0a1a; color: #00ff88; border: 1px solid #333; border-radius: 6px; padding: 12px; font-family: monospace; font-size: 12px; margin-top: 12px; }
  textarea.visible { display: block; }
</style>
</head>
<body>

  <button class="btn-check-all" onclick="checkAllInSection('bad')">Check all BAD</button>
  <button class="btn-export" onclick="exportResults()">Export Results JSON</button>
  <span class="export-status" id="export-status"></span>

<textarea id="output"></textarea>

function render() {
  const container = document.getElementById('matches-container');
  const sections = [
    { verdict: 'good', label: `GOOD matches - validate these (${matches.filter(m=>m.verdict==='good').length})`, cls: 'good' },
    { verdict: 'ok', label: `OK matches - usable but not perfect (${matches.filter(m=>m.verdict==='ok').length})`, cls: 'ok' },
    { verdict: 'bad', label: `BAD matches - reject these (${matches.filter(m=>m.verdict==='bad').length})`, cls: 'bad' },
  ];

  let html = '';
  for (const sec of sections) {
    const items = matches.filter(m => m.verdict === sec.verdict);
    html += `<div class="section">`;
    html += `<div class="section-header ${sec.cls}">${sec.label}</div>`;
    for (let i = 0; i < matches.length; i++) {
      const m = matches[i];
      if (m.verdict !== sec.verdict) continue;
      html += `
        <div class="match-row" id="row-${i}">
          <input type="checkbox" id="cb-${i}" onchange="toggleRow(${i})" />
          <span class="verdict-badge ${m.verdict}">${m.verdict.toUpperCase()}</span>
          <span class="conf">${m.conf}</span>
          <div class="names">
            <span class="our-name">${m.our}</span>
            <span class="arrow">~~</span>
            <span class="their-name">${m.their}</span>
          </div>
          <span class="reason">${m.reason}</span>
        </div>`;
    }
    html += `</div>`;
  }
  container.innerHTML = html;
}

function toggleRow(i) {
  const cb = document.getElementById(`cb-${i}`);
  const row = document.getElementById(`row-${i}`);
  row.classList.toggle('checked', cb.checked);
  updateCounts();
}

function updateCounts() {
  const total = matches.length;
  const checked = document.querySelectorAll('input[type="checkbox"]:checked').length;
  document.getElementById('checked-count').textContent = checked;
  document.getElementById('remaining-count').textContent = total - checked;
}

function checkAllInSection(verdict) {
  for (let i = 0; i < matches.length; i++) {
    if (matches[i].verdict === verdict) {
      const cb = document.getElementById(`cb-${i}`);
      cb.checked = true;
      document.getElementById(`row-${i}`).classList.add('checked');
    }
  }
  updateCounts();
}

function exportResults() {
  const results = {
    reviewed_at: new Date().toISOString(),
    validate: [],   // GOOD/OK that user agreed with -> set validated:true
    reject: [],     // BAD that user agreed with -> remove from matches
    needs_attention: [] // anything user DIDN'T check -> needs manual review
  };

  for (let i = 0; i < matches.length; i++) {
    const m = matches[i];
    const cb = document.getElementById(`cb-${i}`);
    const entry = { our_id: m.our_id, our_name: m.our, their_id: m.their_id, their_name: m.their, verdict: m.verdict };

    if (cb.checked) {
      if (m.verdict === 'good' || m.verdict === 'ok') {
        results.validate.push(entry);
      } else {
        results.reject.push(entry);
      }
    } else {
      results.needs_attention.push(entry);
    }
  }

  const json = JSON.stringify(results, null, 2);
  const ta = document.getElementById('output');
  ta.value = json;
  ta.classList.add('visible');
  ta.select();

  // Also trigger download
  const blob = new Blob([json], { type: 'application/json' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = 'match-review-results.json';
  a.click();
  URL.revokeObjectURL(url);

  document.getElementById('export-status').textContent =
    `Exported: ${results.validate.length} validated, ${results.reject.length} rejected, ${results.needs_attention.length} need attention`;
}

render();
</script>

</html>
