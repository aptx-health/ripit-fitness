<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, system-ui, sans-serif; background: #1a1a2e; color: #e0e0e0; padding: 20px; max-width: 1100px; margin: 0 auto; }
  h1 { color: #00ff88; margin-bottom: 8px; }
  .subtitle { color: #888; margin-bottom: 20px; font-size: 14px; }
  .stats { display: flex; gap: 16px; margin-bottom: 20px; font-size: 14px; }
  .stat { background: #16213e; padding: 8px 14px; border-radius: 6px; }
  .stat .n { color: #00ff88; font-weight: bold; }

  .exercise-card {
    background: #16213e; border-radius: 8px; padding: 14px; margin-bottom: 10px;
    border-left: 4px solid #333;
  }
  .exercise-card.resolved { border-left-color: #00ff88; opacity: 0.6; }
  .exercise-card.no-match { border-left-color: #ffaa00; }

  .exercise-header { display: flex; align-items: center; gap: 12px; margin-bottom: 8px; }
  .our-name { font-weight: bold; font-size: 15px; color: #fff; min-width: 280px; }
  .old-match { font-size: 12px; color: #ff4444; }
  .old-match::before { content: "was: "; color: #666; }

  .candidates { display: flex; flex-wrap: wrap; gap: 6px; }
  .candidate {
    padding: 4px 10px; border-radius: 4px; font-size: 13px;
    cursor: pointer; border: 1px solid #333; background: #0a0a1a;
    transition: all 0.15s;
  }
  .candidate:hover { border-color: #00ff88; background: #1a2744; }
  .candidate.selected { border-color: #00ff88; background: #00ff8822; color: #00ff88; }
  .candidate .score { color: #666; font-size: 11px; margin-left: 4px; }

  .no-match-btn {
    padding: 4px 10px; border-radius: 4px; font-size: 13px;
    cursor: pointer; border: 1px solid #ff444444; background: #0a0a1a; color: #ff4444;
    transition: all 0.15s;
  }
  .no-match-btn:hover { border-color: #ff4444; background: #ff444422; }
  .no-match-btn.selected { border-color: #ff4444; background: #ff444433; }

  .my-pick {
    font-size: 11px; color: #00ff88; margin-left: 8px; padding: 2px 6px;
    background: #00ff8811; border-radius: 3px;
  }

  .actions { position: sticky; bottom: 0; background: #1a1a2e; padding: 16px 0; border-top: 2px solid #333; margin-top: 20px; display: flex; gap: 12px; align-items: center; }
  button {
    padding: 10px 20px; border: none; border-radius: 6px; cursor: pointer;
    font-size: 14px; font-weight: bold;
  }
  .btn-auto { background: #333; color: #e0e0e0; }
  .btn-auto:hover { background: #444; }
  .btn-export { background: #00ff88; color: #1a1a2e; }
  .btn-export:hover { background: #00cc6a; }
  .export-status { color: #00ff88; font-size: 14px; }

  textarea { display: none; width: 100%; height: 300px; background: #0a0a1a; color: #00ff88; border: 1px solid #333; border-radius: 6px; padding: 12px; font-family: monospace; font-size: 12px; margin-top: 12px; }
  textarea.visible { display: block; }
</style>
</head>

const selections = {}; // our_id -> their_id | 'none'

function render() {
  const container = document.getElementById('exercises');
  let html = '';
  for (let i = 0; i < exercises.length; i++) {
    const ex = exercises[i];
    const sel = selections[ex.our_id];
    const resolved = sel !== undefined;
    html += `<div class="exercise-card ${resolved ? (sel === 'none' ? 'no-match' : 'resolved') : ''}" id="card-${i}">`;
    html += `<div class="exercise-header">`;
    html += `<span class="our-name">${ex.our}</span>`;
    html += `<span class="old-match">${ex.old_their}</span>`;
    html += `</div>`;
    html += `<div class="candidates">`;
    for (const c of ex.candidates) {
      const isPick = c.id === ex.pick;
      const isSelected = sel === c.id;
      html += `<span class="candidate ${isSelected ? 'selected' : ''}" onclick="select(${i},'${c.id}')">`;
      html += `${c.name}<span class="score">${c.score}</span>`;
      if (isPick) html += `<span class="my-pick">suggested</span>`;
      html += `</span>`;
    }
    const noMatchSelected = sel === 'none';
    html += `<span class="no-match-btn ${noMatchSelected ? 'selected' : ''}" onclick="select(${i},'none')">No match</span>`;
    html += `</div></div>`;
  }
  container.innerHTML = html;
}

function select(i, theirId) {
  const ex = exercises[i];
  if (selections[ex.our_id] === theirId) {
    delete selections[ex.our_id]; // toggle off
  } else {
    selections[ex.our_id] = theirId;
  }
  render();
  updateCounts();
}

function autoSelectPicks() {
  for (let i = 0; i < exercises.length; i++) {
    const ex = exercises[i];
    if (selections[ex.our_id] === undefined) {
      if (ex.pick) {
        selections[ex.our_id] = ex.pick;
      } else {
        selections[ex.our_id] = 'none';
      }
    }
  }
  render();
  updateCounts();
}

function updateCounts() {
  const resolved = Object.keys(selections).length;
  document.getElementById('resolved-count').textContent = resolved;
  document.getElementById('remaining-count').textContent = exercises.length - resolved;
}

function exportResults() {
  const results = {
    reviewed_at: new Date().toISOString(),
    new_matches: [],
    no_match: [],
    unresolved: []
  };

  for (const ex of exercises) {
    const sel = selections[ex.our_id];
    if (sel === undefined) {
      results.unresolved.push({ our_id: ex.our_id, our_name: ex.our });
    } else if (sel === 'none') {
      results.no_match.push({ our_id: ex.our_id, our_name: ex.our });
    } else {
      const candidate = ex.candidates.find(c => c.id === sel);
      results.new_matches.push({
        our_id: ex.our_id,
        our_name: ex.our,
        their_id: sel,
        their_name: candidate ? candidate.name : sel
      });
    }
  }

  const json = JSON.stringify(results, null, 2);
  const ta = document.getElementById('output');
  ta.value = json;
  ta.classList.add('visible');
  ta.select();

  const blob = new Blob([json], { type: 'application/json' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = 'match-fixes.json';
  a.click();
  URL.revokeObjectURL(url);

  document.getElementById('export-status').textContent =
    `Exported: ${results.new_matches.length} new matches, ${results.no_match.length} no match, ${results.unresolved.length} unresolved`;
}

render();
</script>
</body>
</html>
